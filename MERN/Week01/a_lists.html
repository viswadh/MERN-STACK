<!DOCTYPE html>
<html><head><title>Lists</title></head>
<body>
<h1>Ordered List</h1>
<ol><li>Engineering</li><li>Pharmacy</li><li>Business</li></ol>

<h1>Unordered List</h1>
<ul><li>CSE</li><li>ECE</li><li>EEE</li></ul>

<h1>Nested List</h1>
<ul>
<li>Engineering
<ul><li>AI & ML</li><li>Civil</li></ul>
</li>
</ul>

<h1>Definition List</h1>
<dl>
<dt>HTML</dt>
<dd>Markup Language</dd>
</dl>
</body></html>
